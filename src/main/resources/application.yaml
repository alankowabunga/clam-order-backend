spring:
  application:
    name: clam-order-backend
  
  # H2 Database (Development)
  datasource:
    url: jdbc:h2:mem:clamdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  # JPA/Hibernate
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  
  # H2 Console (Development only)
  h2:
    console:
      enabled: true
      path: /h2-console

# Server
server:
  port: 8080

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    com.project.clamorderbackend: DEBUG
    org.springframework.web: INFO
